name: stockalert
description: Community pharmacy inventory and patient dispensing companion app.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # state management
  flutter_bloc: ^8.1.5

  # local db (offline-first cache)
  sqflite: ^2.3.3
  path: ^1.9.0

  # secure storage for tokens / keys - never put these in sqflite
  flutter_secure_storage: ^9.2.2

  # backend
  supabase_flutter: ^2.16.0

  # qr generation for the identity tag
  qr_flutter: ^4.1.0

  # unique ids for local records before they're synced
  uuid: ^4.4.0

  # routing
  go_router: ^14.2.0

  # google fonts for premium typography (Poppins)
  google_fonts: ^6.2.1

  # map for the pharmacy locator screen
  google_maps_flutter: ^2.9.0
  image_picker: ^1.2.3
  google_sign_in: ^7.2.0
  flutter_dotenv: ^6.0.1
  http: ^1.6.0
  local_auth: ^2.3.0
  geolocator: ^13.0.2
  geocoding: ^5.0.0
  url_launcher: ^6.3.1
  flutter_native_splash: ^2.4.8
  mobile_scanner: ^7.3.0
  app_links: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/app_brand.png
  android: true
  ios: true
  android_12:
    image: assets/images/app_brand.png
    color: "#ffffff"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_brand.png
  remove_alpha_ios: true
